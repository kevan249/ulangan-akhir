<!DOCTYPE html>
<html lang="en">
<head>
  <title>Kevan's Biodata</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .card-box {
      background: white;
      border-radius: 25px;
      padding: 40px;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #333;
    }

    .description {
      text-align: center;
      font-size: 18px;
      color: #666;
      margin-bottom: 35px;
    }

    .info-box {
      border-radius: 20px;
      padding: 25px;
      color: white;
      font-weight: 500;
      transition: 0.4s;
      height: 100%;
    }

    .box1 {
      background: #4facfe;
    }

    .box2 {
      background: #43e97b;
    }

    .box3 {
      background: #fa709a;
    }

    .btn-custom {
      border: none;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 600;
      transition: 0.3s;
    }

    .dark-mode {
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
    }

    .dark-mode .card-box {
      background: #1f1f1f;
      color: white;
    }

    .dark-mode .description {
      color: #ddd;
    }

  </style>
</head>

<body>

<div class="card-box">
  <div class="title">
    Biodata Kevan
  </div>

  <div class="description">
    Seorang siswa yang hobi berpetualang, fotografi, dan
    mengalami berbagai pengalaman baru.
  </div>

  <div class="row g-4 text-center">
    <div class="col-md-4">
      <div class="info-box box1">
        <h4>Identitas</h4>
        <p>
          Kevan Yusgiantoro<br>
          IX-A6/20
        </p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="info-box box2">
        <h4>Kepribadian</h4>
        <p>
          Ceria, Emosional,<br>
          dan Overthinker
        </p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="info-box box3">
        <h4>Hobi</h4>
        <p>
          Fotografi, Sepedaan<br>
          Naik Gunung, dan Billiard
        </p>
      </div>
    </div>
  </div>

  <div class="text-center mt-5">
    <button class="btn btn-primary">
      Post
    </button>
    <button class="btn btn-danger">
      Like
    </button>
    <button class="btn btn-dark">
      Back
    </button>
  </div>
</div>
</body>
</html>
